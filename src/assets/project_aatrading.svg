  <text x="745" y="240" text-anchor="end" font-family="monospace" font-size="11" fill="#22c55e">$9,420</text>
  <text x="595" y="265" font-family="monospace" font-size="11" fill="#64748b">EC2 Uptime</text>
  <text x="745" y="265" text-anchor="end" font-family="monospace" font-size="11" fill="#22c55e">99.9%</text>
  <text x="595" y="290" font-family="monospace" font-size="11" fill="#64748b">Deploy</text>
  <text x="745" y="290" text-anchor="end" font-family="monospace" font-size="11" fill="#3b82f6">GitHub CI/CD</text>
