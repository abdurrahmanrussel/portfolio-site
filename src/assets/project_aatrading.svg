  <rect x="480" y="120" width="50" height="200" fill="#8b5cf6" opacity="0.7" rx="4"/>
  <!-- Trend line -->
  <polyline points="105,260 185,200 265,170 345,180 425,120 505,140" fill="none" stroke="url(#accent)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Dots on line -->
  <circle cx="105" cy="260" r="5" fill="#3b82f6"/>
  <circle cx="185" cy="200" r="5" fill="#3b82f6"/>
  <circle cx="265" cy="170" r="5" fill="#6366f1"/>
  <circle cx="345" cy="180" r="5" fill="#8b5cf6"/>
  <circle cx="425" cy="120" r="5" fill="#8b5cf6"/>
  <circle cx="505" cy="140" r="5" fill="#8b5cf6"/>
