  <text x="670" y="145" text-anchor="middle" font-family="monospace" font-size="22" font-weight="bold" fill="#22c55e">+24.8%</text>
  <line x1="595" y1="165" x2="745" y2="165" stroke="#334155" stroke-width="1"/>
  <text x="595" y="190" font-family="monospace" font-size="11" fill="#64748b">Licenses Sold</text>
  <text x="745" y="190" text-anchor="end" font-family="monospace" font-size="11" fill="#e2e8f0">1,248</text>
  <text x="595" y="215" font-family="monospace" font-size="11" fill="#64748b">Active Users</text>
  <text x="745" y="215" text-anchor="end" font-family="monospace" font-size="11" fill="#e2e8f0">836</text>
